name: build
on: [pull_request]

permissions:
  actions: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # 1. Setup the toolchain first
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          profile: minimal

      # 2. Initialize cache
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      # 3. Log usage
      - name: Log Cache Usage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Total Active Cache Size:"
          gh api /repos/${{ github.repository }}/actions/cache/usage | jq -r '.active_caches_size_in_bytes / 1024 / 1024 | "Approx \(. | floor) MB"'

      # 4. Perform the check
      - name: Run Check
        run: cargo check --locked
